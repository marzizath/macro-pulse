name: Macro Pulse Daily Digest

on:
  schedule:
    # 21:00 UTC = 7am AEST (UTC+10) / 8am AEDT (UTC+11).
    # GitHub Actions cron doesn't follow daylight saving - shift this by 1
    # hour twice a year, or accept the digest landing an hour earlier/later
    # for a few months.
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

# Serialize runs so a manual trigger overlapping the scheduled cron (or two
# manual triggers back to back) can't race on the history/docs commit+push -
# the second run just waits for the first to finish rather than running
# concurrently and getting its push rejected as a non-fast-forward.
concurrency:
  group: macro-pulse-daily-run
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit history/ and docs/ back to the repo
  pages: write
  id-token: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Commit the day's history record + rebuilt dashboard back to the repo.
      # Retries with a rebase on top of the latest remote if the push is
      # rejected - belt-and-suspenders alongside the concurrency group above,
      # in case something else (a manual push, the monthly feedback-review
      # workflow) moved master in between checkout and push.
      - name: Commit history and dashboard
        run: |
          git config user.name "macro-pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add history/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Macro Pulse: $(date -u +%Y-%m-%d) run"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/3) - rebasing onto latest master and retrying..."
            git pull --rebase origin master
          done
          echo "Push still failing after 3 attempts."
          exit 1

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-dashboard:
    needs: run-digest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
